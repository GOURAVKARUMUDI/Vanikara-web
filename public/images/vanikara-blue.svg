<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Blue right arm of the V -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CC8F0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E6BD6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B2A4A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Right arm: wide at top-right, narrows toward center-bottom -->
  <polygon points="130,10 190,10 140,185 85,165" fill="url(#blueGrad)" />
</svg>
