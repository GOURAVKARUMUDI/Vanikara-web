<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Gold/Yellow left arm of the V -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC400;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E07000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Left arm: wide at top-left, narrows toward center-bottom -->
  <polygon points="10,10 70,10 115,165 60,185" fill="url(#goldGrad)" />
</svg>
