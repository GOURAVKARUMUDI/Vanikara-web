<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Red/Orange center triangle of the V -->
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7A00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E84E0F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B1A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Center inverted triangle filling the gap between left and right -->
  <polygon points="70,10 130,10 100,100" fill="url(#redGrad)" />
</svg>
